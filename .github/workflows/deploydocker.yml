
name: deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: "Building a Docker image"
      run: docker build -t chaithanya3339/next-js-app .

    - name: "Giving username and password of docker. They stored in github repo settings secret"
      run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin

    - name: "Docker command to pushh the image to docker hub"
      run: docker push chaithanya3339/next-js-app:latest